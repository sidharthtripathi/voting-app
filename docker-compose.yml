version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: settle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: settle_user
      POSTGRES_PASSWORD: settle_password
      POSTGRES_DB: settle_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U settle_user -d settle_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
